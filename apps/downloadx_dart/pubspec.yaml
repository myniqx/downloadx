name: downloadx
description: >-
  An IDM-style download manager for Dart and Flutter — parallel chunked
  downloads, dynamic splitting, resume across restarts, and pluggable I/O.
version: 0.1.1
repository: https://github.com/myniqx/downloadx
homepage: https://myniqx.dev/projects/downloadx

environment:
  sdk: ">=3.4.0 <4.0.0"

# Zero runtime dependencies — the package only uses dart:core, dart:io,
# dart:async, dart:convert, dart:typed_data and dart:math. Keeping it
# dependency-free means it drops cleanly into any Flutter or Dart project.
dependencies:

dev_dependencies:
  test: ^1.25.0
  lints: ^4.0.0
