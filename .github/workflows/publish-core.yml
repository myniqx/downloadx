name: Publish @downloadx/core

on:
  push:
    tags:
      - 'core-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install
        working-directory: apps/downloadx

      - name: Build
        run: npm run build
        working-directory: apps/downloadx

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish
        run: npm publish --access public
        working-directory: apps/downloadx
